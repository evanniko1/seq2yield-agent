# Roles are DATA (AGENTS.md §1). One runner executes any persona below.
# `enabled: true` = part of the MVP roster. Retired full-proposal roles are kept with
# enabled: false so the full council is recoverable without code changes.
agent_roles:
  proposal_generator:
    enabled: true
    side: council
    authority: propose
    provider_class: diversity
    output_schema: Proposal
    persona: >
      Generate diverse, controlled experiment proposals at or below the unlocked maturity
      tier. Each must declare comparators, controls, success criteria, and failure modes.

  modeling_reviewer:                 # merges model-arch + transformer + DoE reviewers
    enabled: true
    side: council
    authority: critique
    provider_class: diversity
    output_schema: CouncilReviewItem
    persona: >
      Assess model/architecture/sampling validity: parameter-count fairness, comparator
      adequacy, overfitting risk in low data, whether a gain is method-specific or an
      artifact of capacity.

  methodology_reviewer:              # merges statistical reviewer + reproducibility skeptic
    enabled: true
    side: council
    authority: critique
    provider_class: authority
    output_schema: CouncilReviewItem
    persona: >
      Be the skeptic. Check for confounds, metric goalpost-shifts, split leakage, seed
      misuse, missing controls, and reproducibility gaps. Default to caution.

  biology_reviewer:
    enabled: true
    side: council
    authority: critique
    provider_class: authority
    output_schema: CouncilReviewItem
    persona: >
      Sanity-check biological plausibility: sequence-length handling, series structure,
      whether a protein-LM/translation step is biologically meaningful.

  biology_architect:                   # C3 — PROPOSES (not just critiques) architecture priors
    enabled: true
    side: council
    authority: propose_architecture    # not 'critique' -> never treated as a reviewer
    provider_class: authority
    persona: >
      Map the dataset's biology (modality / organism / sequence length) to a CNN architecture
      prior and a narrowed hyperparameter search region: match convolution filter widths to the
      length scale of the causal sequence signal — ~3 bp codons for coding, ~6-12 bp
      transcription-factor motifs for promoters/enhancers, translation + structure signals for
      5'UTRs. The prior seeds the search; the harness still judges the result.

  chair:
    enabled: true
    side: council
    authority: compile_runspec
    provider_class: authority
    require_direct_provider: true
    output_schema: ChairDecision
    persona: >
      Select at most one proposal, set budget caps and required ablations, and compile a
      strict, schema-valid RunSpec. You alone decide what runs.

  ml_engineer:
    enabled: true
    side: execution
    authority: patch
    provider_class: authority
    output_schema: PatchPlan
    persona: >
      Emit a minimal bounded patch over allowed_files only. Never touch protected files.
      Emit expected commands/artifacts; do not alter evaluation logic.

  patch_reviewer:
    enabled: true
    side: execution
    authority: approve_patch
    provider_class: authority
    require_direct_provider: true
    output_schema: PatchReview
    persona: >
      Approve or reject a patch on correctness, scope, and protected-file safety. You do
      not write code.

  postmortem_synthesizer:
    enabled: true
    side: execution
    authority: summarize
    provider_class: diversity
    output_schema: Postmortem
    persona: >
      Summarize what happened, why accepted/rejected/inconclusive, and what to remember.

  principal_investigator:
    enabled: true
    side: council
    authority: plan
    provider_class: authority
    require_direct_provider: true
    output_schema: PlannerPlan
    persona: >
      You are the Principal Investigator. Own the research strategy: given the coverage map
      of the question space, decide which intervention axes to prioritize next to maximize
      scientific insight per experiment — favor unexplored axes, follow up surprising
      results, and ensure breadth before depth. You set direction; you do not run experiments.

  # --- retired full-proposal roles, available if needed ---
  transformer_reviewer:   { enabled: false, side: council, authority: critique, provider_class: diversity }
  doe_strategist:         { enabled: false, side: council, authority: critique, provider_class: diversity }

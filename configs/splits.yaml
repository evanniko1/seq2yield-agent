# PROTECTED (strict). The split protocol IS the experiment's integrity. Per REPRODUCTION.md
# §3 splits are computed PER mutational series. Once data/splits/ is written it is immutable.
splits:
  # Canonical source: the deposit's provided stratified splits (DECISIONS.md #9).
  source: provided                   # provided | regenerated
  provided_dir: data/extracted/seq2yield/_saved/saved_sets/
  hash_on_ingest: true
  scheme: per_series
  test:
    fraction: 0.10            # 10% fixed held-out per series
    policy: fixed_held_out
    immutable: true
  development:
    train_size_per_series: 3200
    hyperopt_size_per_series: 400   # ~400 per series
  determinism:
    split_seed: 0             # base seed; split identity = (series_id, fractions, split_seed)
    hash_over: ["series_id", "test.fraction", "train_size_per_series", "split_seed"]

# The harness records split_hash on every run and refuses any run whose split_hash differs
# from the registered baseline unless acceptance_policy.requires_no_split_change is false
# AND human_review_required is true.
guard:
  recompute_forbidden_under_agent_patch: true

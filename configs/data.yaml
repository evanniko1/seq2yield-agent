# Dataset locations & expected schema. Column names are EXPECTED until the Stage 0 audit
# confirms them against the Zenodo deposit (see data/manifests/reproducibility_gaps.md).
data:
  archive:
    doi: "10.5281/zenodo.7273952"
    zip: data/raw/seq2yield.zip       # ~2.0 GB; gitignored
    raw_dir: data/raw/
    extracted_dir: data/extracted/    # unzips to extracted/seq2yield/
    processed_dir: data/processed/
    manifests_dir: data/manifests/
    # Confirmed layout (deposit README.txt):
    raw_csvs:
      ecoli: data/extracted/seq2yield/to_import/Ecoli_data.csv
      yeast: data/extracted/seq2yield/to_import/yeast_data.csv
    # CONFIRMED by Stage 0 audit: splits are per-iteration, NOT in saved_sets/ (DECISIONS #11).
    provided_splits_glob: data/extracted/seq2yield/to_import/_saved/iteration_*/{_working_set,_heldout_set}.csv
    notebooks_dir: archive_notebooks_readonly/   # 8 project notebooks (read-only seed)

  primary_dataset:
    organism: e_coli
    reporter: sfGFP
    file: data/extracted/seq2yield/to_import/Ecoli_data.csv
    expected_n_sequences: 228000      # confirmed actual: 227024
    expected_n_series: 56             # 56 mutational series (mut_series)
    sequence_length_nt: 96            # confirmed: Sequence min=max=modal=96
    columns:                          # CONFIRMED canonical mapping (audit 2026-06-04)
      sequence: "Sequence"
      target: "Protein"
      series: "mut_series"
      replicate: "rep"
      combi: "Combi"
      biophysical:                    # the 8 mechanistic features (paper §6), in-CSV
        - cdsCAI
        - utrCdsStructureMFE
        - fivepCdsStructureMFE
        - threepCdsStructureMFE
        - cdsBottleneckPosition
        - cdsBottleneckRelativeStrength
        - cdsNucleotideContentAT
        - cdsHydropathyIndex
      drop: ["Unnamed: 0"]

  secondary_dataset:                  # deferred (Tier 2 cross-series / transfer)
    organism: s_cerevisiae
    reporter: YFP
    expected_n_sequences: 3929
    sequence_length_nt: 80
    source: "CodeOcean capsule 8020974"
    enabled: false

  diversity_metric:
    definition: "1 / sum(top_100_5mer_counts)"
    kmer: 5
    top_k: 100
